apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service-deployment
  namespace: default
  labels:
    app: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
      - name: spring-ingestion-gate
        image: multimodal-search/ingestion-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http-port
        env:
        # Dynamically rewrites the gRPC location parameter inside your active Java runtime
        - name: CORE_ENGINE_HOST
          value: "core-engine-service"
        - name: CORE_ENGINE_PORT
          value: "50051"
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: ingestion-service